<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoX | The Future of English</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --card-bg: #16161a;
            --accent: #00f2ff;
            --purple: #7000ff;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* --- Unique Sidebar --- */
        nav {
            width: 80px;
            background: rgba(22, 22, 26, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid #2d2d35;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            position: fixed;
            height: 100vh;
            transition: width 0.3s;
            z-index: 100;
        }
        nav:hover { width: 200px; }
        nav .nav-item { 
            margin: 20px 0; 
            color: #555; 
            font-size: 1.5rem; 
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            width: 100%;
            padding-left: 28px;
        }
        nav .nav-item span { display: none; font-size: 1rem; margin-left: 20px; }
        nav:hover .nav-item span { display: block; }
        nav .nav-item:hover, nav .nav-item.active { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        /* --- Main Content --- */
        main { flex: 1; margin-left: 80px; padding: 40px; }

        .header-unique {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        .search-bar {
            background: var(--card-bg);
            border: 1px solid #2d2d35;
            padding: 10px 20px;
            border-radius: 30px;
            width: 300px;
            color: white;
        }

        /* --- Bento Grid Layout --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 250px);
            gap: 20px;
        }

        .bento-item {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid #2d2d35;
            position: relative;
            overflow: hidden;
            transition: 0.4s;
        }
        .bento-item:hover { border-color: var(--accent); transform: scale(1.02); }

        /* Different Sizes for Unique Look */
        .large { grid-column: span 2; grid-row: span 2; background: linear-gradient(45deg, #16161a, #1a1a2e); }
        .tall { grid-row: span 2; }
        .wide { grid-column: span 2; }

        .glow-circle {
            position: absolute;
            width: 150px;
            height: 150px;
            background: var(--purple);
            filter: blur(100px);
            top: -50px;
            right: -50px;
            opacity: 0.3;
        }

        h1 { font-size: 3.5rem; font-weight: 800; line-height: 1; }
        .accent-text { color: var(--accent); }

        .btn-neon {
            margin-top: 20px;
            background: none;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-neon:hover { background: var(--accent); color: var(--bg-dark); box-shadow: 0 0 30px var(--accent); }

    </style>
</head>
<body>

    <nav>
        <div class="nav-item active"><i class="fas fa-th-large"></i> <span>Dashboard</span></div>
        <div class="nav-item"><i class="fas fa-book"></i> <span>Courses</span></div>
        <div class="nav-item"><i class="fas fa-bolt"></i> <span>Daily Quiz</span></div>
        <div class="nav-item"><i class="fas fa-user"></i> <span>Profile</span></div>
        <div class="nav-item" style="margin-top: auto;"><i class="fas fa-cog"></i> <span>Settings</span></div>
    </nav>

    <main>
        <div class="header-unique">
            <h2>Welcome back, <span class="accent-text">Learner!</span></h2>
            <input type="text" class="search-bar" placeholder="Search lessons...">
        </div>

        <div class="bento-grid">
            <!-- Large Main Section -->
            <div class="bento-item large">
                <div class="glow-circle"></div>
                <h1>Speak <br> <span class="accent-text">Fearlessly.</span></h1>
                <p style="color: #888; margin-top: 20px; font-size: 1.1rem;">AI-powered English learning tailored for your speed.</p>
                <button class="btn-neon">Start Journey</button>
            </div>

            <!-- Tall Feature -->
            <div class="bento-item tall" style="background: linear-gradient(to bottom, #16161a, #7000ff33);">
                <i class="fas fa-microphone" style="font-size: 2rem; color: var(--accent);"></i>
                <h3 style="margin-top: 20px;">Voice Analysis</h3>
                <p style="color: #888; font-size: 0.9rem;">Check your pronunciation instantly.</p>
                <div style="margin-top: 100px; font-size: 3rem; opacity: 0.2;"><i class="fas fa-wave-square"></i></div>
            </div>

            <!-- Wide Feature -->
            <div class="bento-item wide">
                <div style="display: flex; justify-content: space-between;">
                    <div>
                        <h3>Daily Streak</h3>
                        <p class="accent-text" style="font-size: 2rem; font-weight: bold;">15 Days</p>
                    </div>
                    <i class="fas fa-fire" style="font-size: 3rem; color: #ff4d00;"></i>
                </div>
            </div>

            <!-- Small Feature -->
            <div class="bento-item">
                <i class="fas fa-users"></i>
                <h4>Community</h4>
                <p style="color: #888;">Join 5k+ students</p>
            </div>

            <!-- Another Small Feature -->
            <div class="bento-item">
                <i class="fas fa-award"></i>
                <h4>Badges</h4>
                <p style="color: #888;">12 Unlocked</p>
            </div>
        </div>
    </main>

</body>
</html>
